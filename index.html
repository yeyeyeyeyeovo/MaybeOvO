        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&amp;family=Noto+Serif+SC:wght@400;500&amp;display=swap');
        
        :root {
            --accent: #10b981;
        }
        
        body {
            font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        
        .serif {
            font-family: 'Noto Serif SC', Georgia, serif;
        }

        .blog-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }

        .nav-link {
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            color: #10b981;
        }

        .post-content {
            font-size: 17px;
            line-height: 1.85;
        }
        
        .post-content h2 {
            font-size: 1.35rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        
        .post-content p {
            margin-bottom: 1.25rem;
        }

        .modal {
            animation: modalPop 0.2s ease-out forwards;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .section-title {
            position: relative;
            display: inline-block;
        }
        
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: #10b981;
            border-radius: 9999px;
        }

        .tag {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 9999px;
            background-color: #f1f5f9;
            color: #475569;
        }

        .hero-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #f1e7ff10 100%);
        }

        .nav-active {
            color: #10b981;
            font-weight: 500;
        }
    </style>

                id: 1,

                excerpt: "雨夜里，我又一次推开那家熟悉的咖啡馆。暖黄的灯光、磨砂的木桌、老旧的唱片机……",

                    <p>暖黄的灯光、磨砂的木桌、老旧的唱片机，这些元素几乎没有变过。唯一变化的，是坐在角落写东西的我。</p>
                    
                    <h2>为什么喜欢深夜</h2>
                    <p>白天太吵，深夜却安静得像另一个世界。思维好像会变得更清晰，情感也更容易被触动。</p>
                    <p>我常常在这里写完一篇文章，或者只是发呆。店员已经认识我了，会默认给我加一份桂花拿铁。</p>

                    <p>这种连接，比任何社交媒体都更深、更久。</p>

                    <p>比如我想每天写 500 字，我没有去逼自己，而是把电脑直接开着，放在书桌上最显眼的位置。</p>

                    <p>1. <strong>把坏习惯变得不可见</strong> —— 我把手机放进抽屉，并把充电线收起来。</p>

                category: "思考",

    <!-- 头像设置：使用配置中的路径，并添加加载失败回退 -->
    <script>
        function setHeroAvatar() {
            const img = document.getElementById('hero-avatar');
            if (!img || !blogConfig || !blogConfig.avatar) return;
            
            img.src = blogConfig.avatar;
            
            // 如果图片加载失败（常见于中文文件名或路径问题），显示名字首字母作为优雅回退
            img.onerror = function() {
                img.style.display = 'none';
                const fallback = document.createElement('div');
                fallback.className = 'w-full h-full flex items-center justify-center bg-emerald-100 text-emerald-700 text-6xl font-semibold rounded-3xl';
                fallback.textContent = (blogConfig.name || '博').charAt(0);
                img.parentNode.appendChild(fallback);
            };
        }
        
        // 尽早设置头像（DOMContentLoaded）
        document.addEventListener('DOMContentLoaded', setHeroAvatar);
    </script>

                </div>
                <button onclick="closeModal()" 
                        class="text-slate-400 hover:text-slate-700 p-2 -mr-2 -mt-2 transition-colors">
                    <i class="fa-solid fa-times text-2xl"></i>
                </button>
            </div>
            
            <!-- Modal Content -->
            <div class="p-8 overflow-auto flex-1 post-content text-slate-700" id="modal-content">
                <!-- 文章正文由 JS 填充 -->
            </div>
            
            <div class="px-8 py-5 border-t bg-slate-50 flex justify-end">
                <button onclick="closeModal()" 
                        class="px-5 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <!-- QQ 主页大图弹窗 -->
    <div id="qq-modal" onclick="if (event.target.id === 'qq-modal') closeQQModal()" 
         class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="relative max-w-[95vw] max-h-[92vh]">
            <button onclick="closeQQModal()" 
                    class="absolute -top-3 -right-3 bg-white text-slate-700 hover:text-red-600 w-9 h-9 rounded-full flex items-center justify-center shadow-lg text-xl transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>
            <img src="./qq-home.png" alt="My QiCQ" 
                 class="max-w-[95vw] max-h-[88vh] rounded-3xl shadow-2xl object-contain bg-white">
        </div>
    </div>

    <script>
        // ==================== 主要功能脚本 ====================
        
        // 填充个人信息（从配置读取）
        function initPersonalInfo() {
            // 导航
            document.getElementById('nav-name').innerText = blogConfig.name;
            
            // 顶部导航头像（小圆形，放在名字旁边）
            const navLogo = document.getElementById('nav-logo');
            if (navLogo) {
                navLogo.src = blogConfig.avatar;
                navLogo.onerror = function() {
                    // 失败时优雅回退为小绿圆 + 首字母
                    navLogo.style.display = 'none';
                    const fb = document.createElement('div');
                    fb.className = 'w-8 h-8 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-sm font-semibold flex-shrink-0';
                    fb.textContent = (blogConfig.name || '夜').charAt(0);
                    navLogo.parentNode.insertBefore(fb, navLogo);
                };
            }
            
            // Hero
            document.getElementById('hero-name').innerText = `我是${blogConfig.name}`;
            document.getElementById('hero-title').innerText = blogConfig.title;
            document.getElementById('hero-bio').innerText = blogConfig.shortBio;
            
            // 使用统一的健壮头像设置函数（带失败回退）
            setHeroAvatar();
            
            // 关于我
            document.getElementById('about-content').innerHTML = blogConfig.about;
            
            // 联系方式
            const emailEl = document.getElementById('contact-email');
            emailEl.href = `mailto:${blogConfig.email}`;
            emailEl.querySelector('div:last-child').innerHTML = `<div class="font-medium">${blogConfig.email}</div>`;
            
            const wechatEl = document.getElementById('contact-wechat');
            wechatEl.querySelector('div:last-child').innerHTML = `<div class="font-medium">${blogConfig.wechat}</div>`;
            
            const qqEl = document.getElementById('contact-qq');
            qqEl.href = `tencent://message/?uin=${blogConfig.qq}`;
            qqEl.querySelector('div:last-child').innerHTML = `<div class="font-medium">${blogConfig.qq}</div>`;
            
            const githubEl = document.getElementById('contact-github');
            githubEl.href = blogConfig.github;
            // 安全提取 GitHub 显示名（兼容完整 URL 或纯用户名）
            const githubDisplay = (blogConfig.github || '').replace(/^https?:\/\/(www\.)?github\.com\//i, '').replace(/\/$/, '') || blogConfig.github;
            githubEl.querySelector('div:last-child').innerHTML = `<div class="font-medium">${githubDisplay}</div>`;
        }
        
        // 渲染文章卡片
        function renderPosts(filteredPosts = null) {
            const container = document.getElementById('posts-grid');
            const noResults = document.getElementById('no-results');
            container.innerHTML = '';
            
            const toRender = filteredPosts || posts;
            
            if (toRender.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }
            
            toRender.forEach(post => {
                const cardHTML = `
                    <div onclick="openPost(${post.id})" 
                         class="blog-card bg-white border border-slate-100 hover:border-slate-200 rounded-3xl p-7 cursor-pointer group">
                        
                        <div class="flex items-center justify-between mb-4">
                            <span class="tag">${post.category}</span>
                            <span class="text-xs text-slate-400">${post.date}</span>
                        </div>
                        
                        <h3 class="font-semibold text-xl tracking-tight mb-3 group-hover:text-emerald-600 transition-colors">
                            ${post.title}
                        </h3>
                        
                        <p class="text-slate-600 line-clamp-3 text-[15px] leading-relaxed mb-5">
                            ${post.excerpt}
                        </p>
                        
                        <div class="flex items-center justify-between text-sm">
                            <div class="flex items-center gap-x-1.5 text-emerald-600">
                                <span class="font-medium">阅读全文</span>
                                <i class="fa-solid fa-arrow-right text-xs transition-transform group-hover:translate-x-0.5"></i>
                            </div>
                            <span class="text-xs text-slate-400">${post.readTime}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }
        
        // 搜索过滤
        function filterPosts() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            
            if (!keyword) {
                renderPosts(posts);
                return;
            }
            
            const filtered = posts.filter(post => 
                post.title.toLowerCase().includes(keyword) || 
                post.excerpt.toLowerCase().includes(keyword) ||
                post.content.toLowerCase().includes(keyword)
            );
            
            renderPosts(filtered);
        }
        
        // 打开文章弹窗
        function openPost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            // 填充内容
            document.getElementById('modal-title').innerText = post.title;
            document.getElementById('modal-category').innerText = post.category;
            document.getElementById('modal-date').innerText = post.date;
            document.getElementById('modal-readtime').innerText = post.readTime;
            document.getElementById('modal-content').innerHTML = post.content;
            
            // 显示弹窗
            document.getElementById('post-modal').classList.remove('hidden');
            document.getElementById('post-modal').classList.add('flex');
            
            // 禁止背景滚动
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            const modal = document.getElementById('post-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        // QQ 主页截图弹窗控制
        function showQQModal() {
            const modal = document.getElementById('qq-modal');
            if (modal) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeQQModal() {
            const modal = document.getElementById('qq-modal');
            if (modal) {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }
        
        // 提示如何修改
        function showCustomizeTip() {
            const tipHTML = `
                <div class="fixed inset-0 bg-black/60 backdrop-blur z-[200] flex items-center justify-center p-5" onclick="this.remove()">
                    <div onclick="event.stopImmediatePropagation()" class="max-w-lg w-full bg-white rounded-3xl p-8">
                        <h3 class="text-2xl font-semibold tracking-tight mb-5">如何把这个博客改成你的？</h3>
                        
                        <div class="space-y-5 text-sm text-slate-600">
                            <div class="flex gap-4">
                                <div class="font-mono text-emerald-600 font-bold w-5">1</div>
                                <div>用记事本或 VS Code 打开 <span class="font-semibold text-slate-800">index.html</span></div>
                            </div>
                            <div class="flex gap-4">
                                <div class="font-mono text-emerald-600 font-bold w-5">2</div>
                                <div>找到页面最上面的 <span class="font-semibold text-slate-800">blogConfig</span> 那一段，把名字、介绍、头像地址都改成你自己的</div>
                            </div>
                            <div class="flex gap-4">
                                <div class="font-mono text-emerald-600 font-bold w-5">3</div>
                                <div>继续往下找到 <span class="font-semibold text-slate-800">posts</span>，可以删除、修改或新增文章</div>
                            </div>
                            <div class="flex gap-4">
                                <div class="font-mono text-emerald-600 font-bold w-5">4</div>
                                <div>保存后双击 index.html 就能看到新效果了</div>
                            </div>
                        </div>
                        
                        <div class="mt-8 pt-6 border-t text-xs text-slate-500">
                            提示：想换头像？把你的照片放到这个文件夹里，然后把 avatar 那一行改成 <span class="font-mono">"./我的照片.jpg"</span>
                        </div>
                        
                        <button onclick="this.closest('.fixed').remove()" 
                                class="mt-6 w-full py-3 bg-emerald-600 text-white rounded-2xl font-medium">
                            我知道了
                        </button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', tipHTML);
        }
        
        // 键盘支持
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', function(e) {
                if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                }
                if (e.key === 'Escape') {
                    const modal = document.getElementById('post-modal');
                    if (!modal.classList.contains('hidden')) {
                        closeModal();
                    }
                }
            });
            
            // 提示用户可以按 / 搜索
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('focus', function() {
                if (!searchInput.placeholder.includes('按 /')) {
                    searchInput.placeholder = '搜索文章...（按 / 快速聚焦）';
                }
            });
        }
        
        // 初始化一切
        function initBlog() {
            initPersonalInfo();
            renderPosts(posts);
            initKeyboardShortcuts();
            
            // 让搜索框支持中文输入
            console.log('%c[个人博客] 网站初始化完成 - 欢迎使用！', 'color:#64748b');
        }
        
        // 启动！使用 DOMContentLoaded 而不是 window.onload，让内容更早出现，减少旧内容闪现
        document.addEventListener('DOMContentLoaded', initBlog);
    </script>
</body>
</html>
